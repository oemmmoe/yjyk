name: aetea

on:
  schedule:
    - cron: "*/6 * * * *"
  workflow_dispatch:
    branches:

jobs:
  build:
    env:
      PY_COLORS: "1"

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13"]

    runs-on: ${{ matrix.os }}

    steps:

    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    #################################################
    # Install Brave Browser
    #################################################

    - name: Install Brave Browser
      run: |
        echo "Installing Brave Browser..."

        sudo apt-get update
        sudo apt-get install -y curl

        sudo curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg \
          https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg

        echo "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] \
        https://brave-browser-apt-release.s3.brave.com/ stable main" | \
        sudo tee /etc/apt/sources.list.d/brave-browser-release.list

        sudo apt-get update
        sudo apt-get install -y brave-browser

        brave-browser --version

    #################################################
    # Install Cloudflare WARP
    #################################################

    - name: Install WARP
      run: |
        echo "Setting up Cloudflare WARP..."
        sudo apt-get -y update
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        sudo apt-get update && sudo apt-get install -y --no-install-recommends cloudflare-warp
        sudo warp-cli --accept-tos registration new
        sudo warp-cli --accept-tos mode warp+doh
        sudo warp-cli --accept-tos connect
        sleep 5
      shell: bash

    #################################################
    # Verify WARP
    #################################################

    - name: Ensure connection is WARP'ed
      run: |
        echo "Checking WARP connection..."
        curl -s https://www.cloudflare.com/cdn-cgi/trace | grep "warp=on" || echo "WARP not detected but continuing..."

    #################################################
    # Locale Setup
    #################################################

    - name: Set Locale
      run: |
        sudo apt-get install tzdata locales -y
        sudo locale-gen en_US.UTF-8
        sudo localectl set-locale LANG="en_US.UTF-8"
        export LANG="en_US.UTF-8"
        sudo update-locale
        locale

    #################################################
    # Python Dependencies
    #################################################

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade wheel
        pip install --upgrade seleniumbase
        pip install --upgrade pyautogui
        pip install --upgrade pymongo
        pip install --upgrade python-xlib

    #################################################
    # Install Chromedriver
    #################################################

    - name: Install chromedriver
      run: |
        seleniumbase install chromedriver

    #################################################
    # Safe environment tests (won't break workflow)
    #################################################

    - name: Environment tests
      run: |
        echo "Testing Python"
        python --version

        echo "Testing Brave"
        brave-browser --version || echo "Brave test failed but continuing"

        echo "Testing Internet"
        curl -I https://twitch.tv || echo "Internet test failed but continuing"

        echo "Testing display"
        echo $DISPLAY || echo "No display but xvfb will handle it"

    #################################################
    # Run your bot
    #################################################

    - name: Run python gsa.py
      run: |
        python gsa.py --brave --incognito --do-not-track --xvfb --screenshot
